name: release

on:
  push:
    tags:
    - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cluster-api-provider-harvester
  TAG: ${{ github.ref_name }}
  ORG: ${{ github.repository_owner }}

permissions:
  contents: read

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Docker login
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        push: true
        platforms: linux/amd64,linux/arm64,linux/ppc64le,linux/s390x
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: mode=max
        sbom: true

    - name: Sign container image with cosign (keyless OIDC)
      env:
        IMAGE: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
        DIGEST: ${{ steps.build.outputs.digest }}
      run: cosign sign --yes "${IMAGE}@${DIGEST}"

    - name: Generate SLSA build provenance attestation
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.build.outputs.digest }}
        push-to-registry: true

  helm:
    name: helm-chart
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

    - name: Package and push Helm chart
      run: |
        helm package chart/caphv --version ${{ github.ref_name }} --app-version ${{ github.ref_name }}
        helm push caphv-${{ github.ref_name }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  release:
    name: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build]
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Update manifests
      run: |
        make release RELEASE_TAG=${{ env.TAG }} ORG=${{ env.ORG }}
    - name: Create GitHub Release
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view ${{ github.ref_name }} > /dev/null; then
          echo ${{ github.ref_name }} release exists
        else
          gh release create ${{ github.ref_name }} --generate-notes
        fi
        gh release upload ${{ github.ref_name }} out/metadata.yaml --clobber
        gh release upload ${{ github.ref_name }} out/infrastructure-components.yaml --clobber
