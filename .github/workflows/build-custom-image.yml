name: Build and Push Custom Image

on:
  push:
    branches:
      - fix/memory-limits-validation
    paths:
      - 'internal/controller/harvestermachine_controller.go'
      - 'internal/controller/harvestermachine_controller_test.go'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cluster-api-provider-harvester

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/berget-ai/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v0.1.6-memory-fix
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            builder_image=docker.io/library/golang:1.24
            goproxy=
            TARGETARCH=amd64
            package=./
            ldflags=