name: test

on:
  push:
    branches:
    - main
    - harvester-*
  pull_request:
    branches:
    - main
    - harvester-*

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Run unit tests
      run: make test

    - name: Build
      run: make build
