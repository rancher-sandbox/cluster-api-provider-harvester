name: test

on:
  push:
    branches:
    - main
    - harvester-*
  pull_request:
    branches:
    - main
    - harvester-*

jobs:
  unit-test:
    name: unit-tests
    runs-on: ubuntu-latest
    container:
      image: registry.opensuse.org/opensuse/tumbleweed:latest
    steps:
    - name: Install dependencies
      run: zypper -n install git tar gzip make gcc go

    - name: Checkout
      uses: actions/checkout@v4

    - name: Run unit tests
      run: make test

    - name: Build
      run: make build
