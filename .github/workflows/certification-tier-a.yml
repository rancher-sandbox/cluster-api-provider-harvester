name: certification-tier-a

# On-demand full-stack certification (tier A): installs the released Rancher, lets its
# system chart controller bring up the released Turtles/CAPI core/RKE2 providers, then
# certifies the CAPHV release on top. Heavier than the nightly tier; run manually when
# preparing a release or re-validating a Rancher pairing
# (see test/certification/README.md).

on:
  workflow_dispatch:
    inputs:
      caphv_version:
        description: "CAPHV release tag to certify (empty = config default)"
        required: false
        default: ""
      rancher_version:
        description: "Rancher chart version to certify against (empty = config default)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: certification-tier-a-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rancher-turtles:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/certification/go.mod
          cache-dependency-path: test/certification/go.sum

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Export requested version pairing
        if: ${{ inputs.caphv_version != '' || inputs.rancher_version != '' }}
        env:
          CAPHV_VERSION_INPUT: ${{ inputs.caphv_version }}
          RANCHER_VERSION_INPUT: ${{ inputs.rancher_version }}
        run: |
          # Only non-empty inputs are exported; unset variables fall back to the
          # config.yaml defaults (LoadE2EConfig treats empty env as unset anyway).
          if [ -n "$CAPHV_VERSION_INPUT" ]; then
            echo "CAPHV_VERSION=$CAPHV_VERSION_INPUT" >> "$GITHUB_ENV"
            echo "CAPHV_COMPONENTS_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/$CAPHV_VERSION_INPUT/infrastructure-components.yaml" >> "$GITHUB_ENV"
          fi
          if [ -n "$RANCHER_VERSION_INPUT" ]; then
            echo "RANCHER_VERSION=$RANCHER_VERSION_INPUT" >> "$GITHUB_ENV"
          fi

      - name: Run Rancher+Turtles certification
        run: make -C test/certification test-tier-a

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: certification-tier-a-artifacts
          path: test/certification/_artifacts
          retention-days: 7
