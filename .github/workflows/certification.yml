name: certification

# Nightly version-pairing certification (tier C): validates that the targeted CAPHV
# release installs cleanly and stays compatible with the targeted CAPI ecosystem,
# via cluster-api-operator on a self-provisioned kind cluster. No Rancher and no
# Harvester endpoint are required (see test/certification/README.md).

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      caphv_version:
        description: "CAPHV release tag to certify (empty = config default)"
        required: false
        default: ""
      capi_version:
        description: "CAPI core version to certify against (empty = config default)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: certification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-pairing:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/certification/go.mod
          cache-dependency-path: test/certification/go.sum

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Export requested version pairing
        if: ${{ inputs.caphv_version != '' || inputs.capi_version != '' }}
        env:
          CAPHV_VERSION_INPUT: ${{ inputs.caphv_version }}
          CAPI_VERSION_INPUT: ${{ inputs.capi_version }}
        run: |
          # Only non-empty inputs are exported; unset variables fall back to the
          # config.yaml defaults (LoadE2EConfig treats empty env as unset anyway).
          if [ -n "$CAPHV_VERSION_INPUT" ]; then
            echo "CAPHV_VERSION=$CAPHV_VERSION_INPUT" >> "$GITHUB_ENV"
            echo "CAPHV_COMPONENTS_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/$CAPHV_VERSION_INPUT/infrastructure-components.yaml" >> "$GITHUB_ENV"
          fi
          if [ -n "$CAPI_VERSION_INPUT" ]; then
            echo "CAPI_VERSION=$CAPI_VERSION_INPUT" >> "$GITHUB_ENV"
          fi

      - name: Run version-pairing certification
        run: make -C test/certification test

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: certification-artifacts
          path: test/certification/_artifacts
          retention-days: 7
