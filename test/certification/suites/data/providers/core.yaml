# CAPI core provider, deployed via cluster-api-operator (Rancher-independent).
# The `variables` config secret enables the CAPI experimental features CAPHV relies on;
# every provider namespace carries its own copy (see hack/tier-c-smoke.sh).
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
---
apiVersion: v1
kind: Secret
metadata:
  name: variables
  namespace: capi-system
type: Opaque
stringData:
  CLUSTER_TOPOLOGY: "true"
  EXP_CLUSTER_RESOURCE_SET: "true"
  EXP_MACHINE_POOL: "true"
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  version: ${CAPI_VERSION}
  configSecret:
    name: variables
