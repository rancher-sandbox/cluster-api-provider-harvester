# RKE2 bootstrap and control-plane providers in Rancher Turtles CAPIProvider format
# (tier A). A fresh Rancher install brings up Turtles and the CAPI core automatically,
# but NOT the RKE2 providers — they must be declared, as the upstream Turtles e2e does.
# No spec.version: Turtles installs its latest known RKE2 provider release.
apiVersion: v1
kind: Namespace
metadata:
  name: rke2-bootstrap-system
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: rke2-bootstrap
  namespace: rke2-bootstrap-system
spec:
  name: rke2
  type: bootstrap
---
apiVersion: v1
kind: Namespace
metadata:
  name: rke2-control-plane-system
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: rke2-control-plane
  namespace: rke2-control-plane-system
spec:
  name: rke2
  type: controlPlane
