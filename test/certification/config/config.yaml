managementClusterName: caphv-certification

# The CAPHV controller image of the release under certification. kind preloads it into the
# bootstrap cluster when present locally; with tryLoad a missing local image is not an error
# (the cluster pulls it from the public registry instead).
images:
  - name: ghcr.io/rancher-sandbox/cluster-api-provider-harvester:{CAPHV_VERSION}
    loadBehavior: tryLoad

providers: []

intervals:
  default/wait-controllers: ["10m", "10s"]

variables:
  # Management cluster: self-provisioned kind, no pre-existing cluster (version-pairing
  # certification). HELM_BINARY_PATH intentionally has no default here: it must be an
  # absolute path to an existing binary, so the wrappers (run.sh / Makefile / CI) resolve
  # and export it.
  MANAGEMENT_CLUSTER_ENVIRONMENT: "isolated-kind"
  USE_EXISTING_CLUSTER: "false"
  ARTIFACTS_FOLDER: "_artifacts"
  SKIP_RESOURCE_CLEANUP: "false"
  SKIP_DELETION_TEST: "false"

  # Version pairing under certification: the CAPHV release below is certified against the
  # targeted CAPI core. Override via environment (CI does) to certify other pairings.
  CAPHV_VERSION: "v0.3.1"
  CAPHV_COMPONENTS_URL: "https://github.com/rancher-sandbox/cluster-api-provider-harvester/releases/download/v0.3.1/infrastructure-components.yaml"
  CAPI_VERSION: "v1.12.7"

  # cluster-api-operator chart (Rancher-independent provider lifecycle manager).
  CAPI_OPERATOR_REPO_NAME: "capi-operator"
  CAPI_OPERATOR_URL: "https://kubernetes-sigs.github.io/cluster-api-operator"
  CAPI_OPERATOR_PATH: "capi-operator/cluster-api-operator"
  CAPI_OPERATOR_VERSION: "0.27.0"

  # cert-manager (chart version is pinned by the turtles DeployCertManager helper).
  CERT_MANAGER_REPO_NAME: "jetstack"
  CERT_MANAGER_URL: "https://charts.jetstack.io"
  CERT_MANAGER_PATH: "jetstack/cert-manager"
