{{- if .Values.webhooks.enabled }}
{{- if .Values.webhooks.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: caphv-selfsigned
  namespace: {{ include "caphv.namespace" . }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: caphv-webhook-cert
  namespace: {{ include "caphv.namespace" . }}
spec:
  secretName: {{ .Values.webhooks.certSecretName }}
  issuerRef:
    name: caphv-selfsigned
    kind: Issuer
  dnsNames:
    - caphv-webhook-service.{{ include "caphv.namespace" . }}.svc
    - caphv-webhook-service.{{ include "caphv.namespace" . }}.svc.cluster.local
{{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: caphv-validating-webhook-configuration
  {{- if .Values.webhooks.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "caphv.namespace" . }}/caphv-webhook-cert
  {{- end }}
webhooks:
  - name: vharvestermachine.kb.io
    clientConfig:
      service:
        name: caphv-webhook-service
        namespace: {{ include "caphv.namespace" . }}
        path: /validate-infrastructure-cluster-x-k8s-io-v1alpha1-harvestermachine
    rules:
      - apiGroups: [infrastructure.cluster.x-k8s.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [harvestermachines]
    failurePolicy: Fail
    sideEffects: None
    admissionReviewVersions: [v1]
  - name: vharvestercluster.kb.io
    clientConfig:
      service:
        name: caphv-webhook-service
        namespace: {{ include "caphv.namespace" . }}
        path: /validate-infrastructure-cluster-x-k8s-io-v1alpha1-harvestercluster
    rules:
      - apiGroups: [infrastructure.cluster.x-k8s.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [harvesterclusters]
    failurePolicy: Fail
    sideEffects: None
    admissionReviewVersions: [v1]
{{- end }}
