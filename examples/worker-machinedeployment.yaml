# Example: Worker MachineDeployment for CAPHV
#
# This creates a worker node pool with:
# - RKE2ConfigTemplate (bootstrap configuration)
# - HarvesterMachineTemplate (VM specification)
# - MachineDeployment (worker pool, scalable via replicas)
#
# Customize: namespace, clusterName, sshKeyPair, networks, volumes, version
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: RKE2ConfigTemplate
metadata:
  name: my-cluster-worker-config
  namespace: my-cluster
spec:
  template:
    spec:
      agentConfig: {}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HarvesterMachineTemplate
metadata:
  name: my-cluster-worker-machine
  namespace: my-cluster
spec:
  template:
    spec:
      cpu: 2
      memory: 4Gi
      sshUser: sles
      sshKeyPair: default/my-ssh-key
      networks:
        - default/my-vm-network
      volumes:
        - volumeType: image
          imageName: default/my-os-image.qcow2
          volumeSize: 40Gi
          bootOrder: 1
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: my-cluster-workers
  namespace: my-cluster
spec:
  clusterName: my-cluster
  replicas: 1
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: my-cluster
      version: v1.31.6+rke2r1
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: RKE2ConfigTemplate
          name: my-cluster-worker-config
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: HarvesterMachineTemplate
        name: my-cluster-worker-machine
